name: Nightly Security Checks

on:
  schedule:
    # Run every day at 23:00 UTC
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not write reports or open PRs)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  security-checks:
    name: AppSec + DB Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_ENV: development

      - name: Run AppSec scan
        id: appsec
        run: node ops/appsec-scan.mjs --output /tmp/appsec-raw.json
        continue-on-error: true

      - name: Run DB Security scan
        id: db_security
        run: node ops/db-security-scan.mjs --output /tmp/db-security-raw.json
        continue-on-error: true

      - name: Run nightly security runner (generate reports)
        id: runner
        run: |
          DRY=${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
          node ops/nightly-security-runner.mjs $DRY
        continue-on-error: true
        env:
          SECURITY_REPORT_DIR: docs/SecurityChecks

      - name: Check for report changes
        id: diff
        run: |
          git add docs/SecurityChecks/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit security reports
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "security: nightly security report $(date -u +%Y-%m-%d)"

      - name: Push report branch
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          BRANCH="security/nightly-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          git push origin "$BRANCH" --force

      - name: Open Pull Request for nightly report
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="security/nightly-$(date -u +%Y-%m-%d)"
          DATE="$(date -u +%Y-%m-%d)"

          # Check runner exit code to determine overall status
          APPSEC_STATUS="✅ Passed"
          DB_STATUS="✅ Passed"
          if [ "${{ steps.appsec.outcome }}" = "failure" ]; then APPSEC_STATUS="⚠️ Issues found"; fi
          if [ "${{ steps.db_security.outcome }}" = "failure" ]; then DB_STATUS="⚠️ Issues found"; fi

          # Check if PR already exists for this branch
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "security: nightly security report $DATE" \
            --body "## Nightly Security Report — $DATE

          This PR contains the automated nightly security reports generated by the security check workflow.

          | Scan | Status |
          |------|--------|
          | AppSec | $APPSEC_STATUS |
          | DB Security | $DB_STATUS |

          ### Reports
          Reports are stored in \`docs/SecurityChecks/\`.

          ### What to review
          - Open the dated summary Markdown file in \`docs/SecurityChecks/\`
          - Review any CRITICAL or HIGH findings
          - Apply patches as needed before merging

          ### What changed
          Automated nightly security scan reports for $DATE.

          ### Why it changed
          Scheduled nightly AppSec and DB Security scan per project security policy.

          ### Validation performed
          - AppSec scan: $APPSEC_STATUS
          - DB Security scan: $DB_STATUS

          ### Follow-up actions
          - Review and address any CRITICAL or HIGH findings
          - Merge this PR to keep the security report history current" \
            --label "security" 2>/dev/null || echo "PR creation skipped (label may not exist)"

      - name: Upload raw scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-raw-${{ github.run_id }}
          path: |
            /tmp/appsec-raw.json
            /tmp/db-security-raw.json
            docs/SecurityChecks/summary-*.md
          retention-days: 30
          if-no-files-found: ignore

      - name: Security scan summary
        if: always()
        run: |
          echo "## Nightly Security Scan Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scan | Outcome |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| AppSec | ${{ steps.appsec.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DB Security | ${{ steps.db_security.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Report Generation | ${{ steps.runner.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Reports are stored in \`docs/SecurityChecks/\`." >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if critical issues detected
        if: steps.runner.outcome == 'failure' || steps.appsec.outcome == 'failure'
        run: |
          echo "::error::Nightly security scan detected issues. Review docs/SecurityChecks/ for details."
          exit 1
