version: '3.9'

services:
  mysql:
    image: mysql:8
    platform: linux/arm64
    container_name: churchcore-postgres
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: HAPPY47202!
      MYSQL_DATABASE: churchcore_care
      MYSQL_USER: churchcore_app
      MYSQL_PASSWORD: HAPPY522026!
    ports:
      - '3306:3306'
    volumes:
      - churchcore_db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uchurchcore_app', '-pHAPPY522026!']
      interval: 10s
      timeout: 5s
      retries: 6

  translation-guardian:
    profiles:
      - agent
    build:
      context: .
      dockerfile: agents/translation_guardian/Dockerfile
    container_name: churchcore-translation-guardian
    restart: on-failure
    env_file:
      - .env
    environment:
      TRANSLATION_QA_BASE_URL: ${TRANSLATION_QA_BASE_URL:-http://host.docker.internal:3002/index.html}
      TRANSLATION_QA_EMAIL: ${TRANSLATION_QA_EMAIL:-admin@churchcorecare.local}
      TRANSLATION_QA_PASSWORD: ${TRANSLATION_QA_PASSWORD:-ChangeMe!Dev2024#}
    ports:
      - '${TRANSLATION_GUARDIAN_PORT:-8098}:8088'

volumes:
  churchcore_db_data:
