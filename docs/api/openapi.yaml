      operationId: getI18nCatalogForLocale
      security: []
      responses:
        '200':
          description: Translation catalog
          content:
            application/json:
              schema:
                type: object
    patch:
      tags: [i18n]
      summary: Update translation entries for a locale
      operationId: updateI18nCatalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Catalog updated
          content:
            application/json:
              schema:
                type: object

  /v1/i18n/settings/{locale}:
    parameters:
      - in: path
        name: locale
        required: true
        schema:
          type: string
    get:
      tags: [i18n]
      summary: Get locale-specific settings (date format, currency, etc.)
      operationId: getI18nSettings
      security: []
      responses:
        '200':
          description: Locale settings
          content:
            application/json:
              schema:
                type: object

  /v1/i18n/translate:
    post:
      tags: [i18n]
      summary: Auto-translate a string to a target language
      operationId: autoTranslate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text, targetLanguage]
              properties:
                text:
                  type: string
                targetLanguage:
                  type: string
                context:
                  type: string
      responses:
        '200':
          description: Translation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  translated:
                    type: string
                  targetLanguage:
                    type: string

  # ── Telemetry ────────────────────────────────────────────────────────────────

  /v1/telemetry/vitals:
    post:
      tags: [Telemetry]
      summary: Submit frontend Web Vitals metrics
      operationId: submitTelemetryVitals
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: number
                      unit:
                        type: string
                pageUrl:
                  type: string
      responses:
        '200':
          description: Vitals recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/telemetry/events:
    post:
      tags: [Telemetry]
      summary: Submit frontend interaction events
      operationId: submitTelemetryEvents
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      metadata:
                        type: object
      responses:
        '200':
          description: Events recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  # ── Monitoring ───────────────────────────────────────────────────────────────

  /v1/monitoring/db:
    get:
      tags: [Monitoring]
      summary: Database connection health
      operationId: monitoringDb
      responses:
        '200':
          description: Database health status
          content:
            application/json:
              schema:
                type: object

  /v1/monitoring/observability-stack:
    get:
      tags: [Monitoring]
      summary: Observability stack health (OpenTelemetry, Prometheus)
      operationId: monitoringObservabilityStack
      responses:
        '200':
          description: Observability stack status
          content:
            application/json:
              schema:
                type: object

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────
components:

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: >
        HttpOnly session cookie obtained via POST /v1/auth/login.
        Staff sessions use the "session" cookie; portal client sessions use "portal_session".
        Idle timeout: 3 minutes. Absolute max: 8 hours (4 hours for platform_admin).

  parameters:
    ClientId:
      in: path
      name: clientId
      required: true
      schema:
        type: string
        format: uuid
    StaffId:
      in: path
      name: staffId
      required: true
      schema:
        type: string
        format: uuid
    AppointmentId:
      in: path
      name: appointmentId
      required: true
      schema:
        type: string
        format: uuid
    PracticeId:
      in: path
      name: practiceId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: No active session — authenticate via POST /v1/auth/login
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but insufficient role for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    # ── Primitives ──────────────────────────────────────────────────────────────

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    ItemResponse:
      type: object
      properties:
        item:
          type: object

    ItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object

    # ── Auth ────────────────────────────────────────────────────────────────────

    SessionProfile:
      type: object
      properties:
        staffId:
          type: string
        staffAccountId:
          type: string
        clientId:
          type: string
          nullable: true
        portalAccountId:
          type: string
          nullable: true
        tenantId:
          type: string
        role:
          type: string
          enum: [platform_admin, practice_owner, practice_admin, scheduler_biller, supervisor, counselor, intern, client]
        name:
          type: string
        email:
          type: string
          format: email

    # ── System ──────────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        service:
          type: string

    ReadinessResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded, not_ready]
        httpStatus:
          type: integer
        checks:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string

    # ── Core domain ─────────────────────────────────────────────────────────────

    Practice:
      type: object
      required: [id, tenantId, name]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        timezone:
          type: string
        faithTradition:
          type: string
        contactEmail:
          type: string
          format: email
        contactPhone:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StaffMember:
      type: object
      required: [id, tenantId, firstName, lastName, role]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [platform_admin, practice_owner, practice_admin, scheduler_biller, supervisor, counselor, intern]
        licenseType:
          type: string
        licenseNumber:
          type: string
        supervisionStatus:
          type: string
        supervisingStaffId:
          type: string
        locationIds:
          type: array
          items:
            type: string
        email:
          type: string
          format: email
        hasAccount:
          type: boolean
        accountLocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateStaffMemberRequest:
      type: object
      required: [firstName, lastName, role]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [practice_owner, practice_admin, scheduler_biller, supervisor, counselor, intern]
        licenseType:
          type: string
        licenseNumber:
          type: string
        supervisionStatus:
          type: string
        supervisingStaffId:
          type: string
        locationIds:
          type: array
          items:
            type: string
        email:
          type: string
          format: email
        initialPassword:
          type: string
          minLength: 14

    Client:
      type: object
      required: [id, tenantId, firstName, lastName, status]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        preferredName:
          type: string
        status:
          type: string
          enum: [active, waitlist, inactive, discharged]
        faithBackground:
          type: string
        highTouchpoint:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateClientRequest:
      type: object
      required: [firstName, lastName, status]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        preferredName:
          type: string
        status:
          type: string
          enum: [active, waitlist, inactive, discharged]
        faithBackground:
          type: string
        highTouchpoint:
          type: boolean

    UpdateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        preferredName:
          type: string
        faithBackground:
          type: string
        status:
          type: string
          enum: [active, waitlist, inactive, discharged]

    ClientItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/Client'

    ClientListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Client'

    Appointment:
      type: object
      required: [id, tenantId, startsAt, endsAt, status, appointmentType]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        counselorId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, checked-in, completed, cancelled, no-show]
        appointmentType:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        timezone:
          type: string
        locationName:
          type: string
        remoteSession:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AppointmentItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/Appointment'

    CreateAppointmentRequest:
      type: object
      required: [clientId, startsAt, endsAt]
      properties:
        clientId:
          type: string
          format: uuid
        counselorId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        appointmentType:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        status:
          type: string
          enum: [scheduled, checked-in, completed, cancelled, no-show]
        timezone:
          type: string
        locationName:
          type: string
        remoteSession:
          type: boolean
        counselorName:
          type: string

    AppointmentType:
      type: object
      required: [code, label]
      properties:
        code:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        label:
          type: string

    # ── Audit ───────────────────────────────────────────────────────────────────

    AuditEvent:
      type: object
      required: [id, tenantId, action, targetType, targetId, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
        actorType:
          type: string
          enum: [user, system, anonymous]
        action:
          type: string
          description: Dot-notation action code, e.g. client.create
        targetType:
          type: string
        targetId:
          type: string
        result:
          type: string
          enum: [success, denied, error, unknown]
        reasonCode:
          type: string
          enum: [ok, rbac_denied, operation_failed, operation_error]
        occurredAt:
          type: string
          format: date-time
        requestId:
          type: string
        sourceSurface:
          type: string
        sourceWorkflow:
          type: string
        systemComponent:
          type: string

    AuditSummary:
      type: object
      properties:
        window:
          type: object
          properties:
            days:
              type: integer
            from:
              type: string
              format: date-time
            to:
              type: string
              format: date-time
        total:
          type: integer
        byResult:
          type: array
          items:
            type: object
            properties:
              result:
                type: string
              total:
                type: integer
        byAction:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              total:
                type: integer
        byActorRole:
          type: array
          items:
            type: object
            properties:
              actorRole:
                type: string
              total:
                type: integer
        byTargetType:
          type: array
          items:
            type: object
            properties:
              targetType:
                type: string
              total:
                type: integer

    AuditIntelligenceResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/AuditSummary'
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        filters:
          type: object
          properties:
            days:
              type: integer
            limit:
              type: integer
            action:
              type: string
            actorRole:
              type: string
            result:
              type: string
            tenantId:
              type: string
