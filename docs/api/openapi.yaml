openapi: 3.1.0
info:
  title: Faith Counseling API
  version: 1.6.0
  summary: Production-ready API for practice and client lifecycle management with full CRUD operations, audit logging, and HIPAA compliance.
servers:
  - url: https://api.example.com
    description: Placeholder production URL
security:
  - bearerAuth: []
tags:
  - name: Practices
  - name: Staff
  - name: Clients
  - name: Appointments
  - name: Documents
  - name: Audit
paths:
  /v1/practices/{practiceId}:
    get:
      tags: [Practices]
      summary: Get a practice profile
      operationId: getPractice
      parameters:
        - $ref: '#/components/parameters/PracticeId'
      responses:
        '200':
          description: Practice profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Practice'
  /v1/staff:
    get:
      tags: [Staff]
      summary: List staff members for the current tenant
      operationId: listStaff
      responses:
        '200':
          description: Staff list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StaffMember'
    post:
      tags: [Staff]
      summary: Create a staff member
      operationId: createStaff
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaffMemberRequest'
      responses:
        '201':
          description: Staff member created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMember'
  /v1/clients:
    get:
      tags: [Clients]
      summary: List clients visible to the current staff member
      operationId: listClients
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, waitlist, inactive, discharged]
      responses:
        '200':
          description: Client list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
    post:
      tags: [Clients]
      summary: Create a client profile
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
  /v1/clients/{id}:
    get:
      tags: [Clients]
      summary: Get a single client by ID
      operationId: getClient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Client retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Client'
        '404':
          description: Client not found
    patch:
      tags: [Clients]
      summary: Update a client (partial update)
      operationId: updateClient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Client'
        '404':
          description: Client not found
    delete:
      tags: [Clients]
      summary: Delete (archive) a client
      operationId: deleteClient
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Client archived (status set to inactive)
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/Client'
        '404':
          description: Client not found
  /v1/appointments:
    post:
      tags: [Appointments]
      summary: Schedule an appointment
      operationId: createAppointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Appointment scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
  /v1/appointment-types:
    get:
      tags: [Appointments]
      summary: List supported appointment types
      operationId: listAppointmentTypes
      responses:
        '200':
          description: Appointment type list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppointmentType'
  /v1/documents/templates:
    get:
      tags: [Documents]
      summary: List published document templates
      operationId: listDocumentTemplates
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentTemplate'
  /v1/audit-events:
    get:
      tags: [Audit]
      summary: List audit events visible to the caller
      operationId: listAuditEvents
      parameters:
        - in: query
          name: actorId
          schema:
            type: string
            format: uuid
        - in: query
          name: targetType
          schema:
            type: string
      responses:
        '200':
          description: Audit event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PracticeId:
      in: path
      name: practiceId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Practice:
      type: object
      required: [id, tenantId, name, timezone]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        timezone:
          type: string
    StaffMember:
      type: object
      required: [id, tenantId, firstName, lastName, role]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
    Client:
      type: object
      required: [id, tenantId, firstName, lastName, status]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [active, waitlist, inactive, discharged]
        faithBackground:
          type: string
    Appointment:
      type: object
      required: [id, tenantId, clientId, startsAt, endsAt, status, appointmentType]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
        counselorId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [scheduled, checked-in, completed, cancelled, no-show]
        appointmentType:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        remoteSession:
          type: boolean
    AppointmentType:
      type: object
      required: [code, label]
      properties:
        code:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        label:
          type: string
    DocumentTemplate:
      type: object
      required: [id, tenantId, name, version, status]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [draft, published, archived]
    AuditEvent:
      type: object
      required: [id, tenantId, action, targetType, targetId, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: string
        occurredAt:
          type: string
          format: date-time
        outcome:
          type: string
    CreateStaffMemberRequest:
      type: object
      required: [firstName, lastName, role]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
        locationIds:
          type: array
          items:
            type: string
            format: uuid
    CreateClientRequest:
      type: object
      required: [firstName, lastName]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        preferredName:
          type: string
        faithBackground:
          type: string
        referralSourceId:
          type: string
          format: uuid
    UpdateClientRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        preferredName:
          type: string
        faithBackground:
          type: string
        status:
          type: string
          enum: [active, waitlist, inactive, discharged]
    CreateAppointmentRequest:
      type: object
      required: [clientId, startsAt, endsAt]
      properties:
        clientId:
          type: string
          format: uuid
        counselorId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        appointmentType:
          type: string
          enum: [intake_assessment, individual_therapy, couples_therapy, family_therapy, group_therapy]
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        remoteSession:
          type: boolean
