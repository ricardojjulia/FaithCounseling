  /v1/audit/intelligence:
    get:
      tags: [Audit]
      summary: Query audit events with statistical breakdown (practice_admin+)
      operationId: getAuditIntelligence
      parameters:
        - in: query
          name: days
          schema:
            type: integer
            default: 7
            enum: [7, 30, 90]
          description: Time window in days
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
            maximum: 200
          description: Maximum number of events to return
        - in: query
          name: action
          schema:
            type: string
          description: Filter by action name (partial match)
        - in: query
          name: actorRole
          schema:
            type: string
            enum: [platform_admin, practice_owner, practice_admin, counselor, scheduler_biller, system]
        - in: query
          name: result
          schema:
            type: string
            enum: [success, denied, error]
        - in: query
          name: tenantId
          schema:
            type: string
          description: Filter by tenant — only available to platform_admin
      responses:
        '200':
          description: Audit intelligence response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditIntelligenceResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/audit/intelligence/observations:
    post:
      tags: [Audit]
      summary: Generate AI-powered observations from an audit intelligence result (requires ANTHROPIC_API_KEY)
      operationId: generateAuditObservations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary, events]
              properties:
                summary:
                  $ref: '#/components/schemas/AuditSummary'
                events:
                  type: array
                  items:
                    $ref: '#/components/schemas/AuditEvent'
                filters:
                  type: object
      responses:
        '200':
          description: AI observations
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    items:
                      type: string
        '503':
          description: AI service not configured (ANTHROPIC_API_KEY missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

