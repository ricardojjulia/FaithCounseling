openapi: 3.1.0
info:
  title: Faith Counseling API
  version: 2.0.0
  summary: >
    Full-surface API for faith-based counseling practice management — client lifecycle,
    scheduling, billing, portal, audit intelligence, and platform administration.
    All protected endpoints require an active HttpOnly session cookie obtained via
    POST /v1/auth/login. No Bearer tokens are used.
  contact:
    name: Faith Counseling Engineering
servers:
  - url: http://localhost:3001
    description: Local development
  - url: https://api.example.com
    description: Production (replace with actual URL)

# Sessions are delivered as HttpOnly cookies, not Authorization headers.
security:
  - cookieAuth: []

tags:
  - name: Auth
    description: Session authentication and password management
  - name: Clients
    description: Client profiles and clinical records
  - name: Appointments
    description: Scheduling, calendar, reminders, and waitlist
  - name: Staff
    description: Staff members, credentials, and account management
  - name: Practices
    description: Practice profiles and locations
  - name: Documents
    description: Document templates and assignments
  - name: Forms
    description: Clinical forms catalog, assignments, and submissions
  - name: Inventories
    description: Screening inventory definitions and assignments
  - name: Billing
    description: Invoices, payments, superbills, claims, and fee schedules
  - name: Portal
    description: Client-facing portal — profile, documents, requests, messaging
  - name: Faith
    description: Faith-integrated features — templates, goals, resources
  - name: Offerings
    description: Practice service offerings
  - name: Workflows
    description: Clinical workflow recommendations
  - name: Audit
    description: Audit intelligence and compliance
  - name: Reporting
    description: Practice reporting overview
  - name: Platform
    description: Platform-level administration (platform_admin only)
  - name: Reference
    description: Lookup / reference data (DSM-5-TR, appointment types)
  - name: i18n
    description: Internationalization — locales, catalogs, translation
  - name: Telemetry
    description: Frontend telemetry — vitals and events
  - name: Monitoring
    description: Infrastructure health checks
  - name: System
    description: Health probes, metrics, and bootstrap

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── System ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [System]
      summary: Liveness probe
      operationId: healthLive
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/live:
    get:
      tags: [System]
      summary: Liveness probe (alias)
      operationId: healthLiveAlias
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/ready:
    get:
      tags: [System]
      summary: Readiness probe — includes database connectivity check
      operationId: healthReady
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
        '503':
          description: Service not ready

  /bootstrap-metadata:
    get:
      tags: [System]
      summary: Initial metadata required for frontend bootstrap
      operationId: bootstrapMetadata
      security: []
      responses:
        '200':
          description: Bootstrap metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: string
                  appointmentStatuses:
                    type: array
                    items:
                      type: string
                  appointmentTypes:
                    type: array
                    items:
                      type: string
                  clientStatuses:
                    type: array
                    items:
                      type: string

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics export
      operationId: prometheusMetrics
      security: []
      responses:
        '200':
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /openapi.yaml:
    get:
      tags: [System]
      summary: OpenAPI specification (this document)
      operationId: getOpenApiSpec
      security: []
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string

  /docs:
    get:
      tags: [System]
      summary: Swagger UI — interactive API explorer
      operationId: swaggerUi
      security: []
      responses:
        '200':
          description: Swagger UI HTML
          content:
            text/html:
              schema:
                type: string

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in and receive a session cookie
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Authenticated — session cookie set
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/SessionProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '423':
          description: Account locked after too many failed attempts

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session
      operationId: authLogout
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/auth/status:
    get:
      tags: [Auth]
      summary: Check whether the current cookie represents an active session
      operationId: authStatus
      security: []
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  role:
                    type: string
                    nullable: true
                  actorType:
                    type: string

  /v1/auth/me:
    get:
      tags: [Auth]
      summary: Return the profile for the currently authenticated user
      operationId: authMe
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (requires current password for re-authentication)
      operationId: authChangePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 14
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/portal-password-reset-request:
    post:
      tags: [Auth]
      summary: Request a portal password reset link (public)
      operationId: authPortalPasswordResetRequest
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Reset link dispatched (response is identical whether the account exists or not)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  notice:
                    type: string

  /v1/auth/portal-password-reset:
    post:
      tags: [Auth]
      summary: Complete a portal password reset using the token from the email link
      operationId: authPortalPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, newPassword]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 14
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Clients ──────────────────────────────────────────────────────────────────

  /v1/clients:
    get:
      tags: [Clients]
      summary: List clients visible to the current user (scoped by tenant and counselor role)
      operationId: listClients
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, waitlist, inactive, discharged]
        - in: query
          name: counselorId
          schema:
            type: string
      responses:
        '200':
          description: Client list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientListResponse'
    post:
      tags: [Clients]
      summary: Create a client profile
      operationId: createClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClientRequest'
      responses:
        '201':
          description: Client created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientItemResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/clients/{clientId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: Get a single client by ID
      operationId: getClient
      responses:
        '200':
          description: Client profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Clients]
      summary: Partially update a client profile
      operationId: updateClient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Clients]
      summary: Archive a client (sets status to inactive)
      operationId: deleteClient
      responses:
        '200':
          description: Client archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientItemResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/clients/{clientId}/addresses:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List addresses for a client
      operationId: listClientAddresses
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add an address to a client
      operationId: createClientAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressType:
                  type: string
                  enum: [home, work, mailing, other]
                line1:
                  type: string
                line2:
                  type: string
                city:
                  type: string
                state:
                  type: string
                postalCode:
                  type: string
                country:
                  type: string
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/addresses/{addressId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: addressId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a client address
      operationId: updateClientAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Address updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a client address
      operationId: deleteClientAddress
      responses:
        '200':
          description: Address deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/phones:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List phone numbers for a client
      operationId: listClientPhones
      responses:
        '200':
          description: Phone list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add a phone number to a client
      operationId: createClientPhone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phoneType:
                  type: string
                  enum: [mobile, home, work, other]
                number:
                  type: string
                isPrimary:
                  type: boolean
      responses:
        '201':
          description: Phone created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/phones/{phoneId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: phoneId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a client phone number
      operationId: updateClientPhone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Phone updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a client phone number
      operationId: deleteClientPhone
      responses:
        '200':
          description: Phone deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/contacts:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List emergency/family contacts for a client
      operationId: listClientContacts
      responses:
        '200':
          description: Contact list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add a contact to a client
      operationId: createClientContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/contacts/{contactId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: contactId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a client contact
      operationId: updateClientContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a client contact
      operationId: deleteClientContact
      responses:
        '200':
          description: Contact deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/insurance:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List insurance policies for a client
      operationId: listClientInsurance
      responses:
        '200':
          description: Insurance policy list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add an insurance policy to a client
      operationId: createClientInsurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Insurance created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/insurance/{insuranceId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: insuranceId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update an insurance policy
      operationId: updateClientInsurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Insurance updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete an insurance policy
      operationId: deleteClientInsurance
      responses:
        '200':
          description: Insurance deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/referring-providers:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List referring providers for a client
      operationId: listClientReferringProviders
      responses:
        '200':
          description: Referring provider list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add a referring provider to a client
      operationId: createClientReferringProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Referring provider created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/referring-providers/{rpId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: rpId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a referring provider
      operationId: updateClientReferringProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Referring provider updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a referring provider
      operationId: deleteClientReferringProvider
      responses:
        '200':
          description: Referring provider deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/diagnoses:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List DSM-5-TR diagnoses for a client
      operationId: listClientDiagnoses
      responses:
        '200':
          description: Diagnosis list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add a diagnosis to a client
      operationId: createClientDiagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                icdCode:
                  type: string
                diagnosisType:
                  type: string
                  enum: [primary, secondary, provisional, rule-out]
                onsetDate:
                  type: string
                  format: date
                notes:
                  type: string
      responses:
        '201':
          description: Diagnosis created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/diagnoses/{diagnosisId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: diagnosisId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a diagnosis
      operationId: updateClientDiagnosis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Diagnosis updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a diagnosis
      operationId: deleteClientDiagnosis
      responses:
        '200':
          description: Diagnosis deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/medications:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List medications for a client
      operationId: listClientMedications
      responses:
        '200':
          description: Medication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add a medication to a client
      operationId: createClientMedication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Medication created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/medications/{medicationId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: medicationId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update a medication
      operationId: updateClientMedication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Medication updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete a medication
      operationId: deleteClientMedication
      responses:
        '200':
          description: Medication deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/allergies:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: List allergies for a client
      operationId: listClientAllergies
      responses:
        '200':
          description: Allergy list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
    post:
      tags: [Clients]
      summary: Add an allergy to a client
      operationId: createClientAllergy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Allergy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/allergies/{allergyId}:
    parameters:
      - $ref: '#/components/parameters/ClientId'
      - in: path
        name: allergyId
        required: true
        schema:
          type: string
    patch:
      tags: [Clients]
      summary: Update an allergy
      operationId: updateClientAllergy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Allergy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    delete:
      tags: [Clients]
      summary: Delete an allergy
      operationId: deleteClientAllergy
      responses:
        '200':
          description: Allergy deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'

  /v1/clients/{clientId}/clinical-history:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
      tags: [Clients]
      summary: Get the clinical history record for a client
      operationId: getClientClinicalHistory
      responses:
        '200':
          description: Clinical history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
    patch:
      tags: [Clients]
      summary: Update the clinical history record
      operationId: updateClientClinicalHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Clinical history updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'

  /v1/clients/{clientId}/intake-preview:
    parameters:
      - $ref: '#/components/parameters/ClientId'
    get:
